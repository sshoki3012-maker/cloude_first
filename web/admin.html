<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>未来予想 管理</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="wrap">
    <h1>⚙️ 管理画面</h1>

    <div id="gate" class="card">
      <label class="fld">
        <span>合言葉</span>
        <input id="pass" type="password" placeholder="ADMIN_PASSCODE" />
      </label>
      <button id="unlock">解除</button>
      <p class="muted">config.js の ADMIN_PASSCODE と一致させてください。</p>
    </div>

    <div id="panel" style="display:none">
      <!-- 投票状態 -->
      <div class="card">
        <div class="row">
          <h2>投票の受付</h2>
          <div class="spacer"></div>
          <span class="badge" id="open-badge">…</span>
        </div>
        <div class="row" style="margin-top:12px">
          <button id="toggle-open">受付を切り替える</button>
          <a class="btn btn-ghost btn-sm" href="./results.html" target="_blank">結果画面を開く</a>
          <a class="btn btn-ghost btn-sm" href="./qr.html" target="_blank">QR画面を開く</a>
        </div>
      </div>

      <!-- 投票完了状況 -->
      <div class="card">
        <div class="row">
          <h2>投票状況</h2>
          <div class="spacer"></div>
          <button id="refresh-stats" class="btn-ghost btn-sm">更新</button>
        </div>
        <p style="font-size:1.4rem;font-weight:800;margin:10px 0 4px" id="stat-participated">—</p>
        <p class="muted" id="stat-completed">—</p>
      </div>

      <!-- お題 -->
      <div class="card">
        <h2>お題（賞）</h2>
        <div id="awards-list"></div>
        <div class="row" style="margin-top:10px">
          <input id="new-award" placeholder="新しいお題のタイトル" />
          <button id="add-award" class="btn-sm">追加</button>
        </div>
      </div>

      <!-- 名簿 -->
      <div class="card">
        <h2>名簿</h2>
        <div id="people-list"></div>
        <div class="row" style="margin-top:10px">
          <input id="new-person" placeholder="新しい参加者の名前" />
          <button id="add-person" class="btn-sm">追加</button>
        </div>
      </div>

      <!-- データ -->
      <div class="card">
        <h2>データ</h2>
        <div class="row">
          <button id="export-json" class="btn-ghost btn-sm">JSONエクスポート</button>
          <button id="export-csv" class="btn-ghost btn-sm">CSVエクスポート</button>
          <div class="spacer"></div>
          <button id="reset" class="btn-sm" style="background:#5a2330">投票をリセット</button>
        </div>
        <p class="muted">エクスポートは次回の「予想 vs 現実」答え合わせ用の保存にも使えます。</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="./js/admin.js"></script>
</body>
</html>
